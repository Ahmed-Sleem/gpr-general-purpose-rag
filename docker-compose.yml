version: '3.8'

services:
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: cyrkil-universal-rag-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/knowledge_workspace.db
    volumes:
      - ./src/backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: cyrkil-universal-rag-gui
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
